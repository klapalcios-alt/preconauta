<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liga Preconauta - Decks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      :root {
        --font-body: "Manrope", "Segoe UI", sans-serif;
        --font-display: "Fraunces", "Georgia", serif;
        --text: #0f172a;
        --muted: #475569;
        --bg-1: #f8fafc;
        --bg-2: #e2e8f0;
        --glass: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(148, 163, 184, 0.4);
        --glass-highlight: rgba(255, 255, 255, 0.65);
        --glass-strong: rgba(255, 255, 255, 0.9);
        --shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        --shadow-soft: 0 12px 32px rgba(15, 23, 42, 0.12);
        --accent-gold: #d8b45a;
        --accent-silver: #c9cfdb;
        --accent-bronze: #c28b62;
        --accent-ink: #0f172a;
        --chip-bg: rgba(255, 255, 255, 0.6);
        --chip-border: rgba(148, 163, 184, 0.35);
        --blob-1: rgba(248, 187, 99, 0.45);
        --blob-2: rgba(99, 102, 241, 0.35);
        --blob-3: rgba(16, 185, 129, 0.32);
      }

      html[data-theme="dark"] {
        --text: #e2e8f0;
        --muted: #94a3b8;
        --bg-1: #05060b;
        --bg-2: #0f172a;
        --glass: rgba(8, 12, 20, 0.65);
        --glass-border: rgba(148, 163, 184, 0.18);
        --glass-highlight: rgba(255, 255, 255, 0.08);
        --glass-strong: rgba(15, 23, 42, 0.85);
        --shadow: 0 30px 80px rgba(2, 6, 23, 0.6);
        --shadow-soft: 0 20px 40px rgba(2, 6, 23, 0.45);
        --chip-bg: rgba(15, 23, 42, 0.7);
        --chip-border: rgba(148, 163, 184, 0.2);
        --blob-1: rgba(251, 191, 36, 0.18);
        --blob-2: rgba(96, 165, 250, 0.22);
        --blob-3: rgba(236, 72, 153, 0.2);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-body);
        color: var(--text);
        background: radial-gradient(
            1200px circle at 10% 10%,
            rgba(248, 187, 99, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px circle at 90% 20%,
            rgba(99, 102, 241, 0.2),
            transparent 60%
          ),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .font-display {
        font-family: var(--font-display);
      }

      .ambient {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .blob {
        position: absolute;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.8;
        mix-blend-mode: screen;
        animation: float 16s ease-in-out infinite;
      }

      .blob-1 {
        background: radial-gradient(circle at 30% 30%, var(--blob-1), transparent 65%);
        top: -120px;
        left: -80px;
      }

      .blob-2 {
        background: radial-gradient(circle at 40% 40%, var(--blob-2), transparent 65%);
        top: 10%;
        right: -120px;
        animation-delay: -4s;
      }

      .blob-3 {
        background: radial-gradient(circle at 30% 40%, var(--blob-3), transparent 65%);
        bottom: -140px;
        left: 20%;
        animation-delay: -8s;
      }

      .glass-card,
      .glass-panel,
      .glass-table {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        position: relative;
      }

      .glass-card::after,
      .glass-panel::after,
      .glass-table::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: inherit;
        border: 1px solid var(--glass-highlight);
        opacity: 0.45;
        pointer-events: none;
      }

      .glass-card {
        padding: 1.5rem;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .glass-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-soft);
        border-color: var(--glass-highlight);
      }

      .glass-card[data-tilt]:hover {
        transform: none;
        box-shadow: var(--shadow);
        border-color: var(--glass-border);
      }

      .glass-panel {
        padding: 2rem;
      }

      .glass-table {
        overflow: hidden;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        background: var(--chip-bg);
        border: 1px solid var(--chip-border);
        color: var(--muted);
        font-size: 0.85rem;
      }

      .pill.active {
        color: var(--accent-ink);
        background: linear-gradient(135deg, rgba(248, 187, 99, 0.3), rgba(148, 163, 184, 0.2));
        border-color: rgba(248, 187, 99, 0.45);
      }

      .pill.accent {
        color: #0f172a;
        background: linear-gradient(120deg, rgba(248, 187, 99, 0.9), rgba(96, 165, 250, 0.75));
        border-color: rgba(248, 187, 99, 0.6);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.6rem 1.2rem;
        border-radius: 999px;
        border: 1px solid var(--chip-border);
        background: var(--glass-strong);
        color: var(--text);
        font-weight: 600;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        border-color: var(--glass-highlight);
        box-shadow: var(--shadow-soft);
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-danger {
        background: linear-gradient(120deg, rgba(239, 68, 68, 0.95), rgba(185, 28, 28, 0.95));
        border-color: rgba(248, 113, 113, 0.7);
        color: #fff;
        box-shadow: 0 12px 28px rgba(239, 68, 68, 0.35);
      }

      .btn-danger:hover {
        border-color: rgba(254, 202, 202, 0.9);
        box-shadow: 0 18px 36px rgba(239, 68, 68, 0.45);
      }

      .input-glass,
      select {
        background: var(--glass-strong);
        border: 1px solid var(--glass-border);
        border-radius: 999px;
        padding: 0.6rem 1rem;
        color: var(--text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .input-glass:focus,
      select:focus {
        outline: none;
        border-color: rgba(248, 187, 99, 0.6);
        box-shadow: 0 0 0 2px rgba(248, 187, 99, 0.15);
      }

      button:focus-visible,
      a:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid rgba(248, 187, 99, 0.8);
        outline-offset: 2px;
      }

      .title-gradient {
        background: linear-gradient(110deg, #f8e1a3, #f6b37a 40%, #60a5fa 70%, #f472b6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .reveal {
        animation: fadeUp 0.8s ease both;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) translateX(0px);
        }
        50% {
          transform: translateY(30px) translateX(-20px);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .blob,
        .reveal,
        .glass-card {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const VALID_LEAGUES = new Set(["presencial", "online"]);

      function getLeagueFromQuery() {
        const params = new URLSearchParams(window.location.search);
        const league = params.get("league");
        return VALID_LEAGUES.has(league) ? league : "presencial";
      }

      function withLeague(url, league) {
        const [path, hash] = url.split("#");
        const [base, query] = path.split("?");
        const params = new URLSearchParams(query || "");
        params.set("league", league);
        const qs = params.toString();
        return `${base}${qs ? `?${qs}` : ""}${hash ? `#${hash}` : ""}`;
      }

      const LEAGUE = getLeagueFromQuery();
      const NO_DATA_MESSAGE = "Sem dados por enquanto, desculpe =(";
      const BAN_MIN_WIN_RATE = 1 / 3;
      const BAN_MIN_MATCHES = LEAGUE === "online" ? 12 : 24;

      const IconBase = ({ children, size = 24, className = "", ...props }) => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          {...props}
        >
          {children}
        </svg>
      );

      const Search = (p) => (
        <IconBase {...p}>
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </IconBase>
      );

      const Calendar = (p) => (
        <IconBase {...p}>
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
          <line x1="16" x2="16" y1="2" y2="6" />
          <line x1="8" x2="8" y1="2" y2="6" />
          <line x1="3" x2="21" y1="10" y2="10" />
        </IconBase>
      );

      const Shield = (p) => (
        <IconBase {...p}>
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
        </IconBase>
      );
      const Phone = (p) => (
        <IconBase {...p}>
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
        </IconBase>
      );
      const Mail = (p) => (
        <IconBase {...p}>
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </IconBase>
      );
      const Instagram = (p) => (
        <IconBase {...p}>
          <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
          <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
        </IconBase>
      );
      const Youtube = (p) => (
        <IconBase {...p}>
          <path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17" />
          <path d="m10 15 5-3-5-3z" />
        </IconBase>
      );
      const MessageCircle = (p) => (
        <IconBase {...p}>
          <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
        </IconBase>
      );
      const TreePine = (p) => (
        <IconBase {...p}>
          <path d="M12 2l4 6h-3l3 4h-3l3 4H8l3-4H8l3-4H8l4-6z" />
          <path d="M12 14v8" />
        </IconBase>
      );
      const Users = (p) => (
        <IconBase {...p}>
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </IconBase>
      );
      const FileText = (p) => (
        <IconBase {...p}>
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="M10 9H8" />
          <path d="M16 13H8" />
          <path d="M16 17H8" />
        </IconBase>
      );
      const FileCheck = (p) => (
        <IconBase {...p}>
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
          <path d="M14 2v4a2 2 0 0 0 2 2h4" />
          <path d="m9 15 2 2 4-4" />
        </IconBase>
      );

      function parseDateYYYYMMDD(s) {
        if (!s) return null;
        const d = new Date(s + "T00:00:00");
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function formatPtBR(d) {
        return d ? d.toLocaleDateString("pt-BR") : "N/D";
      }

      function getLastEventDate(standings, matches) {
        let best = null;
        const scan = (arr) => {
          (arr || []).forEach((x) => {
            const d = parseDateYYYYMMDD(x.start_date);
            if (d && (!best || d > best)) best = d;
          });
        };
        scan(standings);
        scan(matches);
        return best;
      }

      function formatPercent(value) {
        if (!Number.isFinite(value)) return "-";
        return `${(value * 100).toFixed(1)}%`;
      }

      function isHttpUrl(s) {
        return typeof s === "string" && /^https?:\/\//i.test(s);
      }

      function DeckCell({ name, url }) {
        const label = name || "N/D";
        const href = url || (isHttpUrl(label) ? label : null);
        if (!href) return <span>{label}</span>;
        return (
          <a
            href={href}
            target="_blank"
            rel="noreferrer"
            className="text-amber-200 underline underline-offset-4"
            title="Abrir deck (Moxfield)"
          >
            {isHttpUrl(label) ? "Moxfield" : label}
          </a>
        );
      }

      function getTableKey(m) {
        const tid = typeof m?.tid === "string" && m.tid.trim() ? m.tid.trim() : null;
        const round = m?.round;
        const table = m?.table;
        if (!tid || round == null || table == null) return null;
        return `${tid}::${round}::${table}`;
      }

      function countDistinctTables(rows) {
        const seen = new Set();
        (rows || []).forEach((row) => {
          const key = getTableKey(row);
          if (key) seen.add(key);
        });
        return seen.size;
      }

      function getEventKey(row) {
        const tid = typeof row?.tid === "string" && row.tid.trim() ? row.tid.trim() : null;
        if (tid) return tid;
        const name =
          typeof row?.tournament_name === "string" && row.tournament_name.trim()
            ? row.tournament_name.trim()
            : null;
        const date =
          typeof row?.start_date === "string" && row.start_date.trim() ? row.start_date.trim() : null;
        if (name && date) return `${name}::${date}`;
        return name || date || null;
      }

      function buildEventOptions(rows) {
        const map = new Map();
        (rows || []).forEach((row) => {
          const key = getEventKey(row);
          if (!key) return;
          const dateRaw =
            typeof row?.start_date === "string" && row.start_date.trim() ? row.start_date.trim() : "";
          const date = parseDateYYYYMMDD(dateRaw);
          const name =
            typeof row?.tournament_name === "string" && row.tournament_name.trim()
              ? row.tournament_name.trim()
              : key;
          const current = map.get(key);
          if (!current || (date && (!current.dateObj || date > current.dateObj))) {
            map.set(key, { key, name, dateRaw, dateObj: date });
          }
        });

        return Array.from(map.values())
          .sort((a, b) => {
            if (a.dateObj && b.dateObj && a.dateObj.getTime() !== b.dateObj.getTime()) {
              return b.dateObj - a.dateObj;
            }
            if (a.dateObj && !b.dateObj) return -1;
            if (!a.dateObj && b.dateObj) return 1;
            return a.name.localeCompare(b.name, "pt-BR");
          })
          .map((event) => {
            const dateLabel = event.dateObj ? formatPtBR(event.dateObj) : event.dateRaw || "";
            const label = dateLabel ? `${dateLabel} - ${event.name}` : event.name;
            return { key: event.key, label };
          });
      }

      function buildDeckStatsFromMatches(matches) {
        const map = new Map();
        (matches || []).forEach((m) => {
          const deckName = [m.deck_name_en, m.deck_name_pt].find(
            (v) => typeof v === "string" && v.trim()
          );
          if (!deckName) return;

          const key = deckName.trim();
          let item = map.get(key);
          if (!item) {
            item = {
              deckName: key,
              colecao: m.colecao || "N/D",
              partidas: 0,
              wins: 0,
              draws: 0,
              players: new Set(),
              events: new Set(),
              deckUrl: typeof m.deck_url === "string" && m.deck_url.trim() ? m.deck_url.trim() : null,
            };
            map.set(key, item);
          }

          item.partidas += 1;
          item.wins += Number(m.is_winner || 0);
          if (m.player_name) item.players.add(m.player_name);
          if (m.tid) item.events.add(m.tid);

          const status = String(m.status || "").toLowerCase();
          const winnerId = String(m.winner_id || "").toLowerCase();
          const winnerName = String(m.winner_name || "").toLowerCase();
          const isDraw =
            winnerId === "draw" ||
            winnerName === "draw" ||
            status.includes("draw") ||
            status.includes("empate") ||
            /\bid\b/.test(status);
          item.draws += isDraw ? 1 : 0;

          if ((!item.colecao || item.colecao === "N/D") && m.colecao) {
            item.colecao = m.colecao;
          }
          if (!item.deckUrl && typeof m.deck_url === "string" && m.deck_url.trim()) {
            item.deckUrl = m.deck_url.trim();
          }
        });

        const results = Array.from(map.values()).map((item) => {
          const derrotas = item.partidas - item.wins - item.draws;
          return {
            deckName: item.deckName,
            colecao: item.colecao || "N/D",
            deck_url: item.deckUrl,
            partidas_jogadas: item.partidas,
            vitorias: item.wins,
            empates: item.draws,
            derrotas,
            win_rate: item.partidas ? item.wins / item.partidas : 0,
            jogadores_unicos: item.players.size,
            eventos: item.events.size,
          };
        });

        results.sort((a, b) => b.partidas_jogadas - a.partidas_jogadas);
        return results;
      }

      function buildDeckStats(data) {
        const deckStats = Array.isArray(data?.deck_stats) ? data.deck_stats : [];
        if (deckStats.length) {
          const drawsFromMatches = new Map();
          (data?.matches || []).forEach((m) => {
            const deckName = [m.deck_name_en, m.deck_name_pt].find(
              (v) => typeof v === "string" && v.trim()
            );
            if (!deckName) return;
            const key = deckName.trim();
            const status = String(m.status || "").toLowerCase();
            const winnerId = String(m.winner_id || "").toLowerCase();
            const winnerName = String(m.winner_name || "").toLowerCase();
            const isDraw =
              winnerId === "draw" ||
              winnerName === "draw" ||
              status.includes("draw") ||
              status.includes("empate") ||
              /\bid\b/.test(status);
            if (!isDraw) return;
            drawsFromMatches.set(key, (drawsFromMatches.get(key) || 0) + 1);
          });

          return deckStats
            .map((row) => ({
              deckName: row.deck_name_en || row.deck_name_pt || "N/D",
              colecao: row.colecao || "N/D",
              deck_url: row.deck_url || null,
              partidas_jogadas: Number(row.partidas_jogadas || 0),
              vitorias: Number(row.vitorias || 0),
              empates: Number(row.empates || 0),
              jogadores_unicos: Number(row.jogadores_unicos || 0),
              eventos: Number(row.eventos || 0),
            }))
            .map((row) => {
              const drawOverride = drawsFromMatches.get(row.deckName);
              const empates = drawOverride && drawOverride > 0 ? drawOverride : row.empates;
              const derrotas = row.partidas_jogadas - row.vitorias - empates;
              return {
                ...row,
                empates,
                derrotas,
                win_rate: row.partidas_jogadas ? row.vitorias / row.partidas_jogadas : 0,
              };
            })
            .sort((a, b) => b.partidas_jogadas - a.partidas_jogadas);
        }

        return buildDeckStatsFromMatches(data?.matches || []);
      }

      async function fetchSiteData() {
        const urlCandidates = [
          `./data/${LEAGUE}/site.json`,
          `../data/${LEAGUE}/site.json`,
          `/data/${LEAGUE}/site.json`,
        ];
        let lastError = null;

        for (const url of urlCandidates) {
          try {
            const res = await fetch(url, { cache: "no-store" });
            if (!res.ok) {
              lastError = new Error(`HTTP ${res.status} em ${url}`);
              continue;
            }
            return await res.json();
          } catch (err) {
            lastError = err;
          }
        }

        const tried = urlCandidates.join(", ");
        throw new Error(
          `Dados reais indisponiveis (${tried}).` +
            (lastError ? ` Ultimo erro: ${lastError.message || lastError}` : "")
        );
      }

      function buildMockDecks() {
        const names = [
          "Azorius Crescente",
          "Golgari Raizes",
          "Izzet Forja",
          "Boros Honra",
          "Dimir Susurros",
          "Gruul Investida",
          "Selesnya Harmonia",
          "Rakdos Pacto",
          "Orzhov Reliquias",
          "Simic Fluxo",
          "Temur Tempestade",
          "Jund Abismo",
          "Esper Oraculos",
          "Naya Horizonte",
          "Bant Aurora",
          "Jeskai Prisma",
          "Mardu Legiao",
          "Abzan Juramento",
          "Grixis Cicatriz",
          "Azorius Vigia",
        ];

        const colecoes = [
          "KHM",
          "NEO",
          "DMU",
          "MOM",
          "BRO",
          "ONE",
          "OTJ",
          "WOE",
          "LTR",
          "SNC",
        ];

        return names.map((deckName, index) => {
          const partidas = index >= 18 ? 0 : 10 + (index % 6) * 4;
          const vitorias = partidas ? Math.round(partidas * (0.38 + (index % 5) * 0.08)) : 0;
          const empates = partidas && index % 4 === 0 ? 1 : 0;
          const derrotas = Math.max(partidas - vitorias - empates, 0);
          return {
            deckName,
            colecao: colecoes[index % colecoes.length],
            partidas_jogadas: partidas,
            vitorias,
            empates,
            derrotas,
            win_rate: partidas ? vitorias / partidas : 0,
            jogadores_unicos: partidas ? 2 + (index % 6) : 0,
            eventos: partidas ? 1 + (index % 4) : 0,
          };
        });
      }

      const MOCK_UPDATED_AT = new Date("2026-01-08");

      function compareDecks(a, b, field, dir) {
        if (!field || field === "none") return 0;
        const dirFactor = dir === "asc" ? 1 : -1;
        const getValue = () => {
          switch (field) {
            case "partidas":
              return [a.partidas_jogadas, b.partidas_jogadas, "number"];
            case "vitorias":
              return [a.vitorias, b.vitorias, "number"];
            case "derrotas":
              return [a.derrotas, b.derrotas, "number"];
            case "win_rate":
              return [a.win_rate ?? -1, b.win_rate ?? -1, "number"];
            case "jogadores":
              return [a.jogadores_unicos, b.jogadores_unicos, "number"];
            case "eventos":
              return [a.eventos, b.eventos, "number"];
            case "deckName":
              return [a.deckName || "", b.deckName || "", "string"];
            case "colecao":
              return [a.colecao || "", b.colecao || "", "string"];
            default:
              return [0, 0, "number"];
          }
        };

        const [va, vb, type] = getValue();
        if (type === "string") {
          return dirFactor * String(va).localeCompare(String(vb), "pt-BR", { sensitivity: "base" });
        }
        const na = Number.isFinite(va) ? va : -Infinity;
        const nb = Number.isFinite(vb) ? vb : -Infinity;
        if (na === nb) return 0;
        return dirFactor * (na > nb ? 1 : -1);
      }

        const [sortPrimaryDir, setSortPrimaryDir] = useState("desc");
        const [page, setPage] = useState(1);
        const pageSize = 20;

        useEffect(() => {
          async function loadRealData() {
            try {
              setLoading(true);
              setNotice("");

              const data = await fetchSiteData();
              const matches = Array.isArray(data.matches) ? data.matches : [];
              const list = buildDeckStats(data);
              const lastDate = getLastEventDate(data.standings, matches);

              if (!list.length) {
                throw new Error(NO_DATA_MESSAGE);
              }

              setBaseDecks(list);
              setAllMatches(matches);
              setEventOptions(buildEventOptions(matches));
              setSelectedEvents([]);
              setUpdatedAt(lastDate);
            } catch (e) {
              setNotice(String(e.message || e));
              setBaseDecks([]);
              setAllMatches([]);
              setEventOptions([]);
              setSelectedEvents([]);
              setDecks([]);
              setMatchesData([]);
              setUpdatedAt(null);
            } finally {
              setLoading(false);
            }
          }

          loadRealData();
        }, []);

        useEffect(() => {
          setSelectedEvents((prev) => prev.filter((key) => eventOptions.some((opt) => opt.key === key)));
        }, [eventOptions]);

        useEffect(() => {
          if (!allMatches.length) {
            setMatchesData([]);
            setDecks(selectedEvents.length ? [] : baseDecks);
            return;
          }
          const selectedSet = new Set(selectedEvents);
          const filteredMatches = selectedSet.size
            ? allMatches.filter((row) => selectedSet.has(getEventKey(row)))
            : allMatches;
          setMatchesData(filteredMatches);
          setDecks(buildDeckStatsFromMatches(filteredMatches));
          setUpdatedAt(getLastEventDate([], filteredMatches));
        }, [allMatches, baseDecks, selectedEvents]);

        useEffect(() => {
          setPage(1);
        }, [searchTerm, sortPrimary, sortPrimaryDir, selectedEvents]);

        const filteredDecks = useMemo(() => {
          const term = searchTerm.trim().toLowerCase();
          return decks.filter((d) => {
            const searchOk =
              !term ||
              String(d.deckName || "").toLowerCase().includes(term) ||
              String(d.colecao || "").toLowerCase().includes(term);
            return searchOk;
          });
        }, [decks, searchTerm]);

        const rankedDecks = useMemo(() => {
          const list = [...decks];
          list.sort((a, b) => {
            const primary = compareDecks(a, b, sortPrimary, sortPrimaryDir);
            if (primary !== 0) return primary;
            return String(a.deckName || "").localeCompare(String(b.deckName || ""), "pt-BR");
          });
          return list;
        }, [decks, sortPrimary, sortPrimaryDir]);

        const sortedDecks = useMemo(() => {
          const list = [...filteredDecks];
          list.sort((a, b) => {
            const primary = compareDecks(a, b, sortPrimary, sortPrimaryDir);
            if (primary !== 0) return primary;
            return String(a.deckName || "").localeCompare(String(b.deckName || ""), "pt-BR");
          });

        }, [filteredDecks, sortPrimary, sortPrimaryDir]);

        const top3Decks = useMemo(() => rankedDecks.slice(0, 3), [rankedDecks]);

        useEffect(() => {
          document.querySelectorAll("[data-tilt]").forEach(attachTilt);
        }, [top3Decks.length, loading]);
        const latestLeagueDate = useMemo(() => getLastEventDate([], allMatches), [allMatches]);
        const banCutoffDate = useMemo(() => {
          if (!latestLeagueDate) return null;
          const cutoff = new Date(latestLeagueDate.getFullYear(), latestLeagueDate.getMonth(), 1);
          return Number.isNaN(cutoff.getTime()) ? null : cutoff;
        }, [latestLeagueDate]);
        const bannedDecks = useMemo(() => {
          if (!banCutoffDate || !allMatches.length) return [];
          const historicalMatches = allMatches.filter((m) => {
            const d = parseDateYYYYMMDD(m?.start_date);

      function attachTilt(el) {
        if (el.dataset.tiltBound === "1") return;
        el.dataset.tiltBound = "1";
        const maxRot = 7;
        let rect;
        const onMove = (e) => {
          rect = rect || el.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width;
          const y = (e.clientY - rect.top) / rect.height;
          const rx = (0.5 - y) * (maxRot * 2);
          const ry = (x - 0.5) * (maxRot * 2);
          el.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-2px)`;
          el.style.transition = "transform 40ms linear";
        };
        const onLeave = () => {
          el.style.transition = "transform 400ms cubic-bezier(.2,.8,.2,1)";
          el.style.transform = "";
          rect = null;
        };
        el.addEventListener("mousemove", onMove);
        el.addEventListener("mouseleave", onLeave);
      }

      document.querySelectorAll("[data-tilt]").forEach(attachTilt);
    </script>
