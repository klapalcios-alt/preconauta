name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Montar publicacao
        run: |
          mkdir -p dist/data/presencial dist/data/online
          cp -r site/. dist/
          if [ -f data/presencial/site.json ]; then cp data/presencial/site.json dist/data/presencial/site.json; fi
          if [ -f data/online/site.json ]; then cp data/online/site.json dist/data/online/site.json; fi
          find dist/data -name site.json | grep -q .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
